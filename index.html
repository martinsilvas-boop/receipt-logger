<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Receipts">
<title>Receipt Logger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  :root {
    --ink: #1a1814;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c84b2f;
    --muted: #8c8880;
    --success: #2d6a4f;
    --border: #d4cfc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 48px 28px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 300;
    line-height: 1.1;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  main {
    flex: 1;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .name-row {
    display: flex;
    gap: 10px;
  }

  .name-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    background: var(--cream);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .name-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .photo-zone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    background: var(--cream);
    aspect-ratio: 3/4;
    max-height: 42vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    position: relative;
  }

  .photo-zone:active { opacity: 0.8; }

  .photo-zone.has-photo {
    border-style: solid;
    border-color: var(--ink);
  }

  .photo-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
  }

  .photo-icon {
    width: 40px;
    height: 40px;
    color: var(--muted);
  }

  .photo-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .photo-change {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
  }

  input[type="file"] { display: none; }

  .submit-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.02em;
  }

  .submit-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  .submit-btn:not(:disabled):active { transform: scale(0.98); }

  .status {
    display: none;
    padding: 16px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  .status.loading {
    display: block;
    background: var(--cream);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .status.success {
    display: block;
    background: #eaf4ef;
    border: 1px solid #a8d5bb;
    color: var(--success);
  }

  .status.error {
    display: block;
    background: #fdf0ee;
    border: 1px solid #f0b8ae;
    color: var(--accent);
  }

  .status-title {
    font-weight: 500;
    margin-bottom: 4px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .dots span {
    animation: blink 1.2s infinite;
    opacity: 0;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  footer {
    padding: 16px 28px 32px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Household</div>
  <h1>Receipt<br><em>Logger</em></h1>
</header>

<main>

  <div>
    <div class="header-label" style="margin-bottom:10px">Logged by</div>
    <div class="name-row" id="nameRow"></div>
  </div>

  <div class="photo-zone" id="photoZone" onclick="triggerCamera()">
    <svg class="photo-icon" id="photoIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.51 2.25 8.27 2.25 9.11v9.64c0 .92.746 1.75 1.75 1.75h16c1.004 0 1.75-.83 1.75-1.75V9.11c0-.84-.749-1.6-1.802-1.705a48.14 48.14 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.874-1.055H9.422c-.78 0-1.505.43-1.874 1.055L6.827 6.175z"/>
      <path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/>
    </svg>
    <div class="photo-label" id="photoLabel">Tap to photograph receipt</div>
    <button class="photo-change" id="photoChange" style="display:none" onclick="event.stopPropagation(); triggerCamera()">Change</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">

  <div class="status" id="status"></div>

  <button class="submit-btn" id="submitBtn" disabled onclick="submitReceipt()">
    Log receipt
  </button>

</main>

<footer>Receipt Logger &mdash; Martin &amp; Cata</footer>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVjwmTRFdj7TfTdSd2pu6yy4prFhe8S8QUsP_B4i5UPtzlIhiuA7h3RuRbSqh6SkX-cQ/exec';
  const NAMES = ['Martin', 'Cata'];

  let selectedName = NAMES[0];
  let photoBase64  = null;

  // Build name buttons
  const nameRow = document.getElementById('nameRow');
  NAMES.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'name-btn' + (i === 0 ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      selectedName = name;
      nameRow.querySelectorAll('.name-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    nameRow.appendChild(btn);
  });

  function triggerCamera() {
    document.getElementById('fileInput').click();
  }

  function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const zone = document.getElementById('photoZone');
      zone.classList.add('has-photo');
      document.getElementById('photoIcon').style.display = 'none';
      document.getElementById('photoLabel').style.display = 'none';
      document.getElementById('photoChange').style.display = 'block';

      let img = zone.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        zone.insertBefore(img, zone.firstChild);
      }
      img.src = e.target.result;

      photoBase64 = e.target.result.split(',')[1];
      document.getElementById('submitBtn').disabled = false;
      setStatus('', '');
    };
    reader.readAsDataURL(file);
  }

  function setStatus(type, html) {
    const el = document.getElementById('status');
    el.className = 'status' + (type ? ' ' + type : '');
    el.innerHTML = html;
  }

  async function submitReceipt() {
    if (!photoBase64) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    setStatus('loading', `
      <div class="status-title">Sending<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
      Receipt is being processed
    `);

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: photoBase64,
          logged_by: selectedName,
          mime_type: 'image/jpeg'
        })
      });

      // no-cors means we can't read the response — assume success
      setStatus('success', `
        <div class="status-title">✓ Receipt sent</div>
        Check your Google Sheet in a few seconds
      `);
      setTimeout(resetForm, 4000);

    } catch (err) {
      setStatus('error', `<div class="status-title">Error</div>${err.message}`);
      btn.disabled = false;
    }
  }

  function resetForm() {
    photoBase64 = null;
    document.getElementById('fileInput').value = '';
    const zone = document.getElementById('photoZone');
    zone.classList.remove('has-photo');
    const img = zone.querySelector('img');
    if (img) img.remove();
    document.getElementById('photoIcon').style.display = '';
    document.getElementById('photoLabel').style.display = '';
    document.getElementById('photoChange').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    setStatus('', '');
  }
</script>
</body>
</html>
